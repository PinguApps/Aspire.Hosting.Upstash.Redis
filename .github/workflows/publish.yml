name: Publish NuGet Packages

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      - name: Setup Aspire CLI
        run: |
          dotnet tool install -g Aspire.Cli --version 13.4.6
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Resolve package version
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}"
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          "PACKAGE_VERSION=$version" >> $env:GITHUB_ENV

      - name: Validate NuGet-backed TypeScript AppHost fixture
        shell: pwsh
        run: ./eng/Validate-TypeScriptAppHostPackage.ps1 -PackageVersion "${{ env.PACKAGE_VERSION }}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: packages
          path: artifacts/typescript-apphost-package/packages/*

      - name: Publish Packages
        run: >
          dotnet nuget push "artifacts/typescript-apphost-package/packages/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Publish symbols
        run: >
          dotnet nuget push "artifacts/typescript-apphost-package/packages/*.snupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
