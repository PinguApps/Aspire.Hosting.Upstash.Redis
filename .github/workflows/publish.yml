name: Publish NuGet Packages

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      - name: Resolve package version
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}"
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          "PACKAGE_VERSION=$version" >> $env:GITHUB_ENV

      - name: Restore
        run: dotnet restore Aspire.Hosting.Upstash.Redis.slnx

      - name: Build
        run: dotnet build Aspire.Hosting.Upstash.Redis.slnx -c Release --no-restore

      - name: Pack
        run: dotnet pack Aspire.Hosting.Upstash.Redis.slnx -c Release --no-build -p:Version=${{ env.PACKAGE_VERSION }} -o artifacts/packages

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/packages/*

      - name: Publish Packages
        run: >
          dotnet nuget push "artifacts/packages/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Publish symbols
        run: >
          dotnet nuget push "artifacts/packages/*.snupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
