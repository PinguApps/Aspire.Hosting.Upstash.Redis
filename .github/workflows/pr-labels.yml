name: Auto Labeller

on:
  pull_request:
    types:
      - opened
      - edited

jobs:
  labelling:
    name: Labelling
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: harupy/auto-labeling@937d558e37285af6ca5c5813a826cf6f0d66bf0f # master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          label-pattern: '- \[(.*?)\] ?`(.+?)`' # matches '- [x] `label`'
