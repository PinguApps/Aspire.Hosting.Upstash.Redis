name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
tag-prefix: "v"
version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - minor
  patch:
    labels:
      - patch
  default: patch
categories:
  - title: "🔒 Security"
    labels:
      - "security"
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "bug"
      - "fix"
  - title: "📄 Documentation"
    labels:
      - "docs"
      - "documentation"
  - title: "🔗 Dependencies"
    labels:
      - "dependencies"
  - title: "🌀 Meta"
    labels:
      - "meta"
change-template: "- [#$NUMBER] $TITLE - Thanks to @$AUTHOR!"
change-title-escapes: '\<*_&'
template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
